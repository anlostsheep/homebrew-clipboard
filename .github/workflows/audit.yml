name: Audit cask

on:
  push:
  pull_request:

jobs:
  audit:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # setup-homebrew auto-taps the checked-out repo as anlostsheep/clipboard,
      # so an explicit `brew tap` here would double-tap and fail (remote mismatch).
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: brew style
        run: brew style anlostsheep/clipboard

      - name: brew audit
        run: brew audit --cask --tap anlostsheep/clipboard
